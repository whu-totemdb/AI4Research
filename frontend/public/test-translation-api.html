<!DOCTYPE html>
<html>
<head>
    <title>Translation Settings Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Translation Settings Test</h1>
    <button onclick="testGet()">Test GET</button>
    <button onclick="testPut()">Test PUT</button>
    <pre id="output"></pre>

    <script>
        const api = axios.create({
            baseURL: '/api',
            timeout: 30000,
        });

        function log(message) {
            const output = document.getElementById('output');
            output.textContent += message + '\n';
        }

        async function testGet() {
            log('\n=== Testing GET /api/settings/translation ===');
            try {
                const response = await api.get('/settings/translation');
                log('Success!');
                log('Status: ' + response.status);
                log('Data: ' + JSON.stringify(response.data, null, 2));
            } catch (error) {
                log('Error!');
                log('Message: ' + error.message);
                if (error.response) {
                    log('Status: ' + error.response.status);
                    log('Data: ' + JSON.stringify(error.response.data, null, 2));
                }
            }
        }

        async function testPut() {
            log('\n=== Testing PUT /api/settings/translation ===');
            const data = {
                translation_enabled: true,
                translation_provider_id: 'test_provider',
                translation_prompt: '请将以下文本翻译成中文，保持专业术语的准确性：'
            };
            log('Request data: ' + JSON.stringify(data, null, 2));

            try {
                const response = await api.put('/settings/translation', data);
                log('Success!');
                log('Status: ' + response.status);
                log('Data: ' + JSON.stringify(response.data, null, 2));
            } catch (error) {
                log('Error!');
                log('Message: ' + error.message);
                if (error.response) {
                    log('Status: ' + error.response.status);
                    log('Data: ' + JSON.stringify(error.response.data, null, 2));
                }
            }
        }
    </script>
</body>
</html>
